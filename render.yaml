# ─── NEON TRADE — Render Deployment Configuration ─────────────
# https://render.com/docs/render-yaml

services:
  - type: web
    name: neon-trade
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neon-trade-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: neon-trade-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Set these in Render dashboard → Environment:
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        sync: false

databases:
  - name: neon-trade-db
    plan: free
    databaseName: neontrade
    user: neontrade
